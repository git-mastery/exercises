initialization:
  steps:
    - type: commit
      empty: true
      message: Empty commit
      id: start

    # Create stream-1 with data.txt containing a unique number 12345
    - type: branch
      branch-name: stream-1
    - type: new-file
      filename: data.txt
      contents: |
        11111
        22222
        12345
    - type: add
      files:
        - data.txt
    - type: commit
      message: Add data.txt on stream-1

    # Return to main
    - type: checkout
      branch-name: main

    # Create stream-2 with data.txt containing a unique number 98765
    - type: branch
      branch-name: stream-2
    - type: new-file
      filename: data.txt
      contents: |
        11111
        22222
        98765
    - type: add
      files:
        - data.txt
    - type: commit
      message: Add data.txt on stream-2

    # Return to main at the end for verify to start cleanly
    - type: checkout
      branch-name: main
